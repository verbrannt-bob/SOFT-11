<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PONADIS</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Estilos Propios -->
    <link rel="stylesheet" href="./css/ponadis.css">
</head>

<body>
    <!-- TOPBAR -->
    <div class="container-fluid"><!-- fila 1 -->
        <div class="row d-flex justify-content-around align-items-center">
            <div class="col-3">
                <a href="" class="text-decoration-none logo"><span>Sicid <small>Intranet</small></span></a>
            </div>
            <div class="col-3">
                <p class="ponadis-usuario">
                    <b>PONADIS -</b> <span class="visually-hidden">Rol:</span><i>Administrador</i>
                </p>
            </div>
            <div class="col-3">
                <div class="row d-flex align-items-center justify-content-between">
                    <div class="col-4 d-flex justify-content-evenly align-items-center"> <!--Opciones: - A + -->
                        <button class="btn" aria-label="Disminuir tamaño de la fuente">
                            <i class="fa-solid fa-minus border p-2 rounded-1" aria-hidden="true"></i>
                        </button>
                        <button class="btn" aria-label="Cambiar la fuente">
                            <i class="fa-solid fa-a border p-2 rounded-1" aria-hidden="true"></i>
                        </button>
                        <button class="btn" aria-label="Aumentar tamaño de la fuente">
                            <i class="fa-solid fa-plus border p-2 rounded-1" aria-hidden="true"></i>
                        </button>
                    </div>
                    <div class="col-1"> <!--Paleta de colores-->
                        <i class="fa-solid fa-circle-half-stroke border p-2 rounded-1"></i>
                    </div>
                    <div class="col-1"><!--Notificaciones-->
                        <i class="fa-solid fa-bell fa-2xl"></i>
                    </div>
                    <div class="col-1 usuario"><i class="fa-solid fa-user border rounded-circle p-2" aria-hidden="true"></i>
                    </div> <!--Usuarios-->
                </div>
                <div class="list-group usuario-menu">
                    <a href="./ponadis-registro.html" class="list-group-item list-group-item-action">Registrarse</a>
                    <a href="./ponadis-inicio-sesion.html" class="list-group-item list-group-item-action">Iniciar Sesión</a>
                </div>
            </div>
        </div>
    </div>
    <!-- fila 2 -->

</body>

<script src="./js/ponadis.js"></script>

</html>
