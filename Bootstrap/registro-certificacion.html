<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva certificación</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="css/certificaciones.css">

</head>

<body>

    <!-- FORMULARIO REGISTRO DE CERTIFICACIONES -->
    <div class="container my-5">

        <!-- FILA TÍTULO -->
        <div class="row">
            <div class="col text-center">
                <h1 class="fw-semibold">
                    <i class="fa-solid fa-certificate me-2" aria-hidden="true"></i>
                    Registro de certificaciones
                </h1>

                <p class="text-muted">
                    Complete la información para registrar una certificación.
                </p>
            </div>
        </div>

        <!-- FILA FORMULARIO -->
        <div class="row justify-content-center">
            <div class="col-12 col-sm-12 col-md-10 col-lg-8 col-xl-7">

                <form aria-labelledby="titulo-certificacion" novalidate onsubmit="event.preventDefault()">

                    <!-- Nombre -->
                    <div class="mb-4">
                        <label for="nombreCertificacion" class="form-label fw-semibold">
                            Nombre de la certificación
                            <span class="text-danger" aria-hidden="true">*</span>
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-award" aria-hidden="true"></i>
                            </span>

                            <input type="text" id="nombreCertificacion" name="nombreCertificacion" class="form-control"
                                required aria-required="true" aria-describedby="ayudaNombre">

                        </div>

                        <div id="ayudaNombre" class="form-text">
                            Ingrese el nombre oficial de la certificación.
                        </div>
                    </div>

                    <!-- Institución -->
                    <div class="mb-4">
                        <label for="institucion" class="form-label fw-semibold">
                            Institución emisora
                            <span class="text-danger" aria-hidden="true">*</span>
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-building-columns" aria-hidden="true"></i>
                            </span>

                            <input type="text" id="institucion" name="institucion" class="form-control" required
                                aria-required="true" aria-describedby="ayudaInstitucion">
                        </div>

                        <div id="ayudaInstitucion" class="form-text">
                            Nombre de la organización que otorgó la certificación.
                        </div>
                    </div>

                    <!-- Vigencia -->
                    <div class="mb-4">
                        <label for="vigencia" class="form-label fw-semibold">
                            Fecha de vigencia
                            <span class="text-danger" aria-hidden="true">*</span>
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-calendar-days" aria-hidden="true"></i>
                            </span>

                            <input type="date" id="vigencia" name="vigencia" class="form-control" required
                                aria-required="true">
                        </div>
                    </div>

                    <!-- Descripción -->
                    <div class="mb-4">
                        <label for="descripcion" class="form-label fw-semibold">
                            Descripción
                            <span class="text-muted">(Opcional)</span>
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-file-lines" aria-hidden="true"></i>
                            </span>

                            <textarea id="descripcion" name="descripcion" rows="4" class="form-control"
                                aria-describedby="ayudaDescripcion"></textarea>
                        </div>

                        <div id="ayudaDescripcion" class="form-text">
                            Puede agregar observaciones o detalles relevantes.
                        </div>
                    </div>

                    <!-- BOTONES -->
                    <div class="d-flex justify-content-end gap-3">

                        <button type="reset" class="btn btn-outline-secondary">
                            <i class="fa-solid fa-eraser me-2" aria-hidden="true"></i>
                            Limpiar
                        </button>

                        <button class="btn btn-guardar-certificacion" id="btnGuardar">
                            <i class="fa-solid fa-floppy-disk me-2" aria-hidden="true"></i>
                            Registrar certificación
                        </button>

                    </div>

                </form>

            </div>
        </div>

    </div>

    <!-- Modal para éxito -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="successModalLabel">Certificación registrada</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Cretificación creada con éxito.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Bootstrap -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script src="/js/registro-certificaciones.js"></script>

</body>

</html>
