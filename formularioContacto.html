<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="css/certificaciones.css">

</head>

<body>

    <!-- FORMULARIO REGISTRO DE CERTIFICACIONES -->
    <div class="container my-5">

        <!-- FILA TÍTULO -->
        <div class="row">
            <div class="col text-center">
                <h1 class="fw-semibold">
                    <i class="fa-solid fa-certificate me-2" aria-hidden="true"></i>
                    Contáctanos
                </h1>

                <p class="text-muted">
                    Complete su información de contacto e indiquenos en que podemos ayudarle.
                </p>
            </div>
        </div>

        <!-- FILA FORMULARIO -->
        <div class="row justify-content-center">
            <div class="col-12 col-sm-12 col-md-10 col-lg-8 col-xl-7">

                <form aria-labelledby="titulo-certificacion" novalidate onsubmit="event.preventDefault()">

                    <!-- Nombre -->
                    <div class="mb-4">
                        <label for="nombreCertificacion" class="form-label fw-semibold">
                            Nombre completo
                            <span class="text-danger" aria-hidden="true">*</span>
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-user" aria-hidden="true"></i>
                            </span>

                            <input type="text" id="nombreCertificacion" name="nombreCertificacion" class="form-control"
                                required aria-required="true" aria-describedby="ayudaNombre">

                        </div>

                        <div id="ayudaNombre" class="form-text">
                            Ingrese su nombre completo.
                        </div>
                    </div>

                    <!-- Correo -->
                    <div class="mb-4">
                        <label for="institucion" class="form-label fw-semibold">
                            Correo electrónico
                            <span class="text-danger" aria-hidden="true">*</span>
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-envelope" aria-hidden="true"></i>
                            </span>

                            <input type="text" id="institucion" name="institucion" class="form-control" required
                                aria-required="true" aria-describedby="ayudaInstitucion">
                        </div>

                        <div id="ayudaInstitucion" class="form-text">
                            Ingrese su correo electrónico.
                        </div>
                    </div>

                    <!-- Consulta -->
                    <div class="mb-4">
                        <label for="descripcion" class="form-label fw-semibold">
                            Consulta
                            <span class="text-danger" aria-hidden="true">*</span>
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-message" aria-hidden="true"></i>
                            </span>

                            <textarea id="descripcion" name="descripcion" rows="4" class="form-control" required aria-required="true"
                                aria-describedby="ayudaDescripcion"></textarea>
                        </div>

                        <div id="ayudaDescripcion" class="form-text">
                            Digite su consulta.
                        </div>
                    </div>

                    <!-- BOTONES -->
                    <div class="d-flex justify-content-end gap-3">

                        <button type="reset" class="btn btn-outline-secondary">
                            <i class="fa-solid fa-eraser me-2" aria-hidden="true"></i>
                            Limpiar
                        </button>

                        <button class="btn btn-guardar-certificacion" id="btnGuardar">
                            <i class="fa-solid fa-arrow-right me-2" aria-hidden="true"></i>
                            Enviar Consulta
                        </button>

                    </div>

                </form>

            </div>
        </div>

    </div>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Bootstrap -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script src="/js/formularioContacto.js"></script>

</body>

</html>
